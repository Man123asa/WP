<!DOCTYPE html>
<html>
<head>
    <title>Startup Idea Validator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body>
    <div class="container">
        <h1>🚀 Startup Idea Validator</h1>
        <div class="input-section">
            <textarea id="ideaInput" placeholder="Describe the problem you are solving..."></textarea>
            <button onclick="submitIdea()">Validate Idea</button>
        </div>

        <div class="dashboard">
            <div class="list-container">
                <h3>Validated Ideas</h3>
                <div id="ideasList"></div>
            </div>
            <div class="chart-container">
                <canvas id="sentimentChart"></canvas>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
